name: Bug report
description: Report a problem with Slurry Extension Loading Point
title: "[Bug]: "
labels: [bug]
body:
  - type: input
    id: game-version
    attributes:
      label: Game version
      description: Free text is fine; no exact version format is required.
      placeholder: "Example: 1.13.0.0, latest Steam version, or Xbox version from menu"
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - PC
        - Mac
        - PlayStation
        - Xbox
    validations:
      required: true
  - type: input
    id: map
    attributes:
      label: Map
      placeholder: "Example: Riverbend Springs"
    validations:
      required: true
  - type: input
    id: mods
    attributes:
      label: Relevant active mods
      description: List mod names only. Please do not upload mod files.
      placeholder: "Example: Animal barn mods, slurry/digestate mods, AI helper mods"
  - type: input
    id: description
    attributes:
      label: What happened?
      description: Briefly describe the issue and what you expected. Please do not upload files here.
      placeholder: "Example: Vehicle stops filling when aligned under the pipe"
    validations:
      required: true
  - type: textarea
    id: log
    attributes:
      label: Log excerpt or full log file
      description: Paste relevant log lines, or drag and drop the complete log file here.
      render: text
